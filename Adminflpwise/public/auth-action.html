<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlipWise Admin — Set password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 p-3">
  <div class="card shadow-sm" style="max-width:420px;width:100%;">
    <div class="card-body p-4">
      <h1 class="h5 fw-bold mb-2">Finish admin setup</h1>
      <p class="text-muted small mb-4" id="status-msg">Choose a password for your account.</p>
      <form id="pw-form" style="display:none;">
        <div class="mb-3">
          <label class="form-label small fw-semibold" for="new-pw">New password</label>
          <input type="password" id="new-pw" class="form-control" minlength="8" autocomplete="new-password" required />
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold" for="confirm-pw">Confirm password</label>
          <input type="password" id="confirm-pw" class="form-control" minlength="8" autocomplete="new-password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100" id="submit-btn">Save password &amp; continue</button>
      </form>
      <p class="text-danger small mb-0 d-none" id="err-msg"></p>
    </div>
  </div>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDE9Ix9BeWMkzCExBStwAOLW49eumWbdUg",
      authDomain: "flipwiseadmin.firebaseapp.com",
      projectId: "flipwiseadmin",
      storageBucket: "flipwiseadmin.firebasestorage.app",
      messagingSenderId: "336978239686",
      appId: "1:336978239686:web:c8e35426e08e9f5e1137c7",
      measurementId: "G-X23HZ7ZYNV"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || '';
    const oobCode = params.get('oobCode') || '';

    const statusEl = document.getElementById('status-msg');
    const formEl = document.getElementById('pw-form');
    const errEl = document.getElementById('err-msg');
    const submitBtn = document.getElementById('submit-btn');

    /** Set when verifyPasswordResetCode succeeds — needed because confirmPasswordReset does not sign the user in. */
    let verifiedEmail = null;

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.classList.remove('d-none');
    }

    if (mode !== 'resetPassword' || !oobCode) {
      statusEl.textContent = 'This link is invalid or has expired. Request a new setup email from your administrator.';
    } else {
      auth.verifyPasswordResetCode(oobCode)
        .then((email) => {
          verifiedEmail = email;
          statusEl.textContent = 'Set a password for ' + email + ', then you can sign in at the admin terminal.';
          formEl.style.display = 'block';
        })
        .catch(() => {
          statusEl.textContent = 'This link is invalid or has expired.';
        });
    }

    document.getElementById('pw-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('d-none');
      if (!verifiedEmail) {
        showErr('Setup session is not ready. Reload the page using your invitation link.');
        return;
      }
      const a = document.getElementById('new-pw').value;
      const b = document.getElementById('confirm-pw').value;
      if (a.length < 8) { showErr('Use at least 8 characters.'); return; }
      if (a !== b) { showErr('Passwords do not match.'); return; }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';
      try {
        await auth.confirmPasswordReset(oobCode, a);
        await auth.signInWithEmailAndPassword(verifiedEmail, a);
        try {
          await db.collection('users').doc(auth.currentUser.uid).update({
            setupPending: false,
            lastActive: 'Just now',
          });
        } catch (fe) {
          await auth.signOut();
          showErr('Password was saved but account activation failed (Firestore rules). Ask a super admin to set setupPending to false on your user document, then sign in again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Save password & continue';
          return;
        }
        await auth.signOut();
        window.location.replace(new URL('index.html', window.location.href).href);
      } catch (err) {
        try { await auth.signOut(); } catch (_) {}
        showErr(err.message || 'Could not reset password.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save password & continue';
      }
    });
  </script>
</body>
</html>
